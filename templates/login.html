{% extends "base_minimal.html" %}
{% block title %}Log in — FCE Exam Trainer{% endblock %}
{% block content %}
<div class="auth-page">
  <h1 class="auth-title">Log in</h1>
  <p class="auth-intro">Enter your email and password to access your account.</p>
  {% if error %}
  <div class="feedback error" role="alert">{{ error }}</div>
  {% endif %}
  <form method="post" action="{{ url_for('home.login') }}" class="auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="auth-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" value="{{ request.form.email or '' }}" />
    </div>
    <div class="auth-field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
    </div>
    <div class="auth-actions">
      <button type="submit" class="btn btn-hero">Log in</button>
    </div>
  </form>
  <p class="auth-footer">
    Don’t have an account? <a href="{{ url_for('home.register') }}">Sign up</a>
  </p>
</div>
{% endblock %}
